name: Deploy KONECT Frontend to Server

on:
  push:
    branches: ['main', 'develop']

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect deployment targets
        id: targets
        run: |
          changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" || true)"

          if [ -z "$changed_files" ]; then
            changed_files="$(git show --name-only --pretty=format: "${{ github.sha }}" || true)"
          fi

          app_changed=false
          web_changed=false
          shared_changed=false

          while IFS= read -r file; do
            case "$file" in
              apps/app/*)
                app_changed=true
                ;;
              apps/web/*)
                web_changed=true
                ;;
              packages/*|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|turbo.json|tsconfig*.json|eslint.config.js|.github/workflows/deploy.yml)
                shared_changed=true
                ;;
            esac
          done <<< "$changed_files"

          if [ "$shared_changed" = "true" ]; then
            app_changed=true
            web_changed=true
          fi

          deploy_web=$web_changed

          if [ "${{ github.ref_name }}" != "main" ]; then
            deploy_web=false
          fi

          {
            echo "app=$app_changed"
            echo "web=$deploy_web"
          } >> "$GITHUB_OUTPUT"

          echo "Changed files:"
          echo "$changed_files"
          echo "Deploy app: $app_changed"
          echo "Web changed: $web_changed"
          echo "Deploy web: $deploy_web"

      - name: Setup pnpm
        if: steps.targets.outputs.app == 'true' || steps.targets.outputs.web == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: steps.targets.outputs.app == 'true' || steps.targets.outputs.web == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22.20.0'
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.targets.outputs.app == 'true' || steps.targets.outputs.web == 'true'
        run: pnpm install --frozen-lockfile

      - name: Validate runtime secrets
        if: steps.targets.outputs.app == 'true' || steps.targets.outputs.web == 'true'
        run: |
          missing=0

          if [ "${{ github.ref_name }}" = "main" ]; then
            [ -n "${{ secrets.VITE_API_PATH }}" ] || { echo "::error::Missing secret: VITE_API_PATH"; missing=1; }
            [ -n "${{ secrets.VITE_SENTRY_DSN }}" ] || { echo "::error::Missing secret: VITE_SENTRY_DSN"; missing=1; }
          else
            [ -n "${{ secrets.VITE_API_PATH_STAGE }}" ] || { echo "::error::Missing secret: VITE_API_PATH_STAGE"; missing=1; }
            [ -n "${{ secrets.VITE_SENTRY_DSN_STAGE }}" ] || { echo "::error::Missing secret: VITE_SENTRY_DSN_STAGE"; missing=1; }
          fi

          [ "$missing" -eq 0 ] || exit 1

      - name: Validate production sourcemap secrets
        if: github.ref_name == 'main' && (steps.targets.outputs.app == 'true' || steps.targets.outputs.web == 'true')
        run: |
          missing=0
          [ -n "${{ secrets.SENTRY_ORG }}" ] || { echo "::error::Missing secret: SENTRY_ORG"; missing=1; }
          [ -n "${{ secrets.SENTRY_PROJECT }}" ] || { echo "::error::Missing secret: SENTRY_PROJECT"; missing=1; }
          [ -n "${{ secrets.SENTRY_AUTH_TOKEN }}" ] || { echo "::error::Missing secret: SENTRY_AUTH_TOKEN"; missing=1; }
          [ "$missing" -eq 0 ] || exit 1

      - name: Resolve Sentry project
        if: steps.targets.outputs.app == 'true' || steps.targets.outputs.web == 'true'
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "SENTRY_PROJECT_FOR_BUILD=${{ secrets.SENTRY_PROJECT }}" >> "$GITHUB_ENV"
          else
            echo "SENTRY_PROJECT_FOR_BUILD=${{ secrets.SENTRY_PROJECT_STAGE }}" >> "$GITHUB_ENV"
          fi

      - name: Create .env file
        if: steps.targets.outputs.app == 'true' || steps.targets.outputs.web == 'true'
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            {
              echo "VITE_API_PATH=${{ secrets.VITE_API_PATH }}"
              echo "VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}"
              echo "VITE_SENTRY_ENABLED=true"
              echo "VITE_SENTRY_ENVIRONMENT=production"
              echo "VITE_SENTRY_RELEASE=${{ github.sha }}"
              echo "VITE_SENTRY_TRACES_SAMPLE_RATE=0.7"
              echo "VITE_SENTRY_REPLAY_SESSION_SAMPLE_RATE=0.0"
              echo "VITE_SENTRY_REPLAY_ON_ERROR_SAMPLE_RATE=1.0"
            } > .env
          else
            {
              echo "VITE_API_PATH=${{ secrets.VITE_API_PATH_STAGE }}"
              echo "VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN_STAGE }}"
              echo "VITE_SENTRY_ENABLED=true"
              echo "VITE_SENTRY_ENVIRONMENT=staging"
              echo "VITE_SENTRY_RELEASE=${{ github.sha }}"
              echo "VITE_SENTRY_TRACES_SAMPLE_RATE=0.1"
              echo "VITE_SENTRY_REPLAY_SESSION_SAMPLE_RATE=0.0"
              echo "VITE_SENTRY_REPLAY_ON_ERROR_SAMPLE_RATE=1.0"
            } > .env
          fi

      - name: Build app
        if: steps.targets.outputs.app == 'true'
        env:
          CI: true
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ env.SENTRY_PROJECT_FOR_BUILD }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_RELEASE: ${{ github.sha }}
        run: pnpm --filter @konect/app build

      - name: Build web
        if: steps.targets.outputs.web == 'true'
        env:
          CI: true
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ env.SENTRY_PROJECT_FOR_BUILD }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_RELEASE: ${{ github.sha }}
        run: pnpm --filter @konect/web build

      - name: Setup SSH key
        if: steps.targets.outputs.app == 'true' || steps.targets.outputs.web == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SERVER_IP }} 2>/dev/null >> ~/.ssh/known_hosts

      - name: Deploy app dist to server
        if: steps.targets.outputs.app == 'true'
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            DEPLOY_PATH="/opt/konect/prod/client"
          else
            DEPLOY_PATH="/opt/konect/stage/client"
          fi
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} "mkdir -p $DEPLOY_PATH"
          rsync -avz --delete-after \
            -e "ssh -p ${{ secrets.SSH_PORT }}" \
            ./apps/app/dist/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }}:$DEPLOY_PATH

      - name: Deploy web dist to server
        if: steps.targets.outputs.web == 'true'
        run: |
          DEPLOY_PATH="/opt/konect/web"
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} "mkdir -p $DEPLOY_PATH"
          rsync -avz --delete-after \
            -e "ssh -p ${{ secrets.SSH_PORT }}" \
            ./apps/web/dist/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }}:$DEPLOY_PATH
