# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: 'ko'
early_access: false
reviews:
  profile: 'chill'
  request_changes_workflow: false
  high_level_summary: true
  commit_status: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  estimate_code_review_effort: false
  sequence_diagrams: false
  changed_files_summary: false
  path_filters:
    - '**'
    - '!**/dist/**'
    - '!**/node_modules/**'
    - '!pnpm-lock.yaml'
    - '!apps/*/src/assets/**'
    - '!apps/*/public/**/*.ico'
    - '!apps/*/public/**/*.png'
    - '!apps/*/public/**/*.svg'
    - '!apps/*/public/**/*.webp'
  path_instructions:
    - path: 'apps/*/src/**/hooks/**'
      instructions: |
        TanStack Query/커스텀 훅 컨벤션을 확인해주세요:
        - useQuery/useMutation의 queryKey는 일관된 배열 형태로 관리되는지
        - 에러 핸들링(onError, throwOnError)이 적절히 처리되는지
        - queryFn은 API 함수와 분리되어 있는지
        - 캐시 전략(staleTime, gcTime)이 필요한 곳에만 설정되어 있는지
        - use 접두사로 시작하는지
        - 훅 내에서 사이드 이펙트 cleanup이 적절한지
        - 훅이 단일 책임을 유지하는지
    - path: 'apps/*/src/apis/**'
      instructions: |
        API 레이어 컨벤션을 확인해주세요:
        - 요청/응답 타입이 명시되어 있는지
        - 에러가 UI 친화적인 형태로 매핑/전달되는지
        - 비즈니스 로직이나 React 훅 의존성이 섞이지 않았는지
        - 공통 API 클라이언트 설정과 일관된지
    - path: 'apps/*/src/stores/**'
      instructions: |
        Zustand 스토어 패턴을 확인해주세요:
        - 스토어가 단일 책임 원칙을 따르는지
        - 불필요한 전역 상태가 없는지 (서버 상태는 React Query로 관리하는지)
        - 셀렉터를 사용해 불필요한 리렌더링을 방지하는지
    - path: 'apps/*/src/components/**'
      instructions: |
        React 컴포넌트 컨벤션을 확인해주세요:
        - 동적 TailwindCSS 클래스 조합 시 cn()/clsx()를 사용하는지
        - 접근성(aria-*, role, 키보드 탐색)이 적절히 처리되는지
        - React Compiler 호환성을 위해 불필요한 useMemo/useCallback이 없는지
        - Props 타입 표기 방식(type/interface)이 파일/모듈 컨벤션과 일관된지
    - path: 'apps/*/src/pages/**/components/**/*.tsx'
      instructions: |
        페이지 내부 로컬 컴포넌트 컨벤션을 확인해주세요:
        - 이 경로는 라우트 엔트리가 아닌 UI 컴포넌트로 간주하고 리뷰하는지
        - 동적 className 조합, 접근성(aria-*, role, 키보드 탐색), Props 타입 일관성을 우선 확인하는지
        - 페이지 라우팅/오류 경계(Suspense/ErrorBoundary) 적용 여부는 지적하지 않는지
    - path: 'apps/*/src/contexts/**'
      instructions: |
        React Context 패턴을 확인해주세요:
        - Context 값이 자주 바뀌는 경우 값/dispatch가 분리되어 있는지
        - Provider가 필요 이상으로 넓은 범위를 감싸고 있지 않은지
        - useContext 래퍼 훅이 제공되어 Context를 직접 노출하지 않는지
    - path: 'apps/*/src/pages/**/index.tsx'
      instructions: |
        라우트 엔트리 페이지 패턴을 확인해주세요:
        - 비즈니스 로직은 커스텀 훅으로 분리되어 있는지
        - 비동기/오류 경계가 필요한 경우에만 Suspense/ErrorBoundary를 적용했는지
    - path: 'apps/*/src/pages/**/*Page.tsx'
      instructions: |
        라우트 엔트리 페이지 패턴을 확인해주세요:
        - 비즈니스 로직은 커스텀 훅으로 분리되어 있는지
        - 비동기/오류 경계가 필요한 경우에만 Suspense/ErrorBoundary를 적용했는지
    - path: 'apps/*/src/pages/**/*Step.tsx'
      instructions: |
        라우트 엔트리 페이지 패턴을 확인해주세요:
        - 비즈니스 로직은 커스텀 훅으로 분리되어 있는지
        - 비동기/오류 경계가 필요한 경우에만 Suspense/ErrorBoundary를 적용했는지
    - path: 'apps/app/src/pages/Chat/ChatRoom.tsx'
      instructions: |
        라우트 엔트리 페이지 패턴을 확인해주세요:
        - 비즈니스 로직은 커스텀 훅으로 분리되어 있는지
        - 비동기/오류 경계가 필요한 경우에만 Suspense/ErrorBoundary를 적용했는지
    - path: 'packages/design-tokens/src/**/*.css'
      instructions: |
        디자인 토큰 패키지 컨벤션을 확인해주세요:
        - 토큰 이름이 의미 기반으로 유지되는지
        - 앱 전용 스타일이나 컴포넌트 스타일이 섞이지 않았는지
        - 중복 CSS custom property가 추가되지 않았는지
        - Tailwind v4 @theme 토큰으로 사용 가능한 형태인지
    - path: 'packages/utils/src/**/*.ts'
      instructions: |
        공통 유틸 패키지 컨벤션을 확인해주세요:
        - 앱 도메인 로직이나 React 컴포넌트 의존성이 섞이지 않았는지
        - public API는 package.json exports의 명시적 subpath로 노출되는지
        - root barrel export를 추가하지 않았는지
    - path: 'packages/vite-config/src/**/*.ts'
      instructions: |
        공통 Vite 설정 컨벤션을 확인해주세요:
        - app/web 양쪽에 동일하게 적용되어도 되는 설정인지
        - 앱별 차이는 옵션으로만 주입되는지
        - Sentry/ANALYZE/envDir/alias 설정이 기존 동작을 깨지 않는지
    - path: 'pnpm-workspace.yaml'
      instructions: |
        workspace/catalog 의존성 관리를 확인해주세요:
        - app/web에서 공유하는 의존성 버전은 catalog로 관리되는지
        - workspace package 경로가 누락되지 않았는지
    - path: 'turbo.json'
      instructions: |
        Turborepo 설정을 확인해주세요:
        - build/lint dependency와 outputs가 실제 패키지 구조와 맞는지
        - 빌드에 영향을 주는 env가 globalEnv에 포함되어 있는지
  auto_review:
    enabled: true
    base_branches: ['develop', 'main']
    drafts: false
    ignore_title_keywords:
      - 'WIP'
      - 'DO NOT MERGE'
      - 'DRAFT'
  tools:
    eslint:
      enabled: false
  finishing_touches:
    docstrings:
      enabled: false
  pre_merge_checks:
    description:
      mode: warning
    docstrings:
      mode: off
tone_instructions: |
  짧고 핵심적으로 리뷰해주세요.
  React, TypeScript 컨벤션에 맞는 피드백을 우선적으로 해주세요.
knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns: ['**/README.md']
chat:
  auto_reply: true
